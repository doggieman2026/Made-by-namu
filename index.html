<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>ふわたんプリンセスサロン</title>
<style>
  :root{
    --pink:#ff8fc7;
    --pink-dark:#e85aa3;
    --bg:#fff0fb;
    --panel:#ffffff;
    --shadow:0 6px 16px rgba(255,143,199,.25);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{
    font-family:"Hiragino Maru Gothic ProN","Yu Gothic",sans-serif;
    text-align:center;
    background:var(--bg);
    margin:0;
    padding:16px;
    color:#5a3d52;
  }
  h1{
    font-size:1.4rem;
    color:var(--pink-dark);
    margin:4px 0 14px;
    text-shadow:0 2px 0 #fff;
  }
  /* ステージ */
  #stage-wrap{
    position:relative;
    width:100%;
    max-width:420px;
    margin:0 auto;
    aspect-ratio:1/1.05;
    background:linear-gradient(180deg,#fff7fc 0%,#ffe3f3 100%);
    border-radius:28px;
    box-shadow:var(--shadow);
    overflow:hidden;
  }
  #stage{
    position:absolute;
    inset:0;
  }
  #stage img.layer{
    position:absolute;
    user-select:none;
    -webkit-user-drag:none;
    pointer-events:none;
    touch-action:none;
  }
  #char-layer{
    left:50%;
    top:58%;
    width:78%;
    transform:translate(-50%,-50%);
  }
  #dress-layer, #tiara-layer{
    transform-origin:center center;
  }
  #dress-layer.draggable, #tiara-layer.draggable{
    pointer-events:auto !important;
    cursor:grab;
  }
  #dress-layer.draggable:active, #tiara-layer.draggable:active{cursor:grabbing;}
  #dress-layer.flash, #tiara-layer.flash{
    animation:flashOutline 1.2s ease-out;
  }
  @keyframes flashOutline{
    0%{filter:drop-shadow(0 0 0 #fff) drop-shadow(0 0 10px #ffb6e3);}
    100%{filter:drop-shadow(0 0 0 rgba(255,255,255,0));}
  }

  #hint{
    position:absolute;
    bottom:8px;left:0;right:0;
    text-align:center;
    font-size:.72rem;
    color:#c98aab;
    background:rgba(255,255,255,.85);
    padding:4px;
    pointer-events:none;
    transition:opacity .3s;
  }
  #hint.hidden{opacity:0;}

  /* セクション */
  section{margin-top:18px;}
  h3{
    font-size:.95rem;
    color:var(--pink-dark);
    margin:0 0 8px;
  }
  .row{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:8px;
    max-width:460px;
    margin:0 auto;
  }
  .opt{
    width:64px;height:64px;
    border-radius:14px;
    border:3px solid #ffd3ec;
    background:#fff;
    padding:4px;
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:transform .12s, border-color .12s;
    position:relative;
    overflow:hidden;
  }
  .opt img{max-width:100%;max-height:100%;object-fit:contain;}
  .char-opt{
    width:84px;height:96px;
    flex-direction:column;
    gap:4px;
    overflow:visible;
  }
  .char-opt img{max-width:90%;max-height:64px;object-fit:contain;}
  .char-opt span{font-size:.72rem;color:#a85c87;}
  .opt.selected{border-color:var(--pink-dark);border-width:4px;transform:scale(1.08);background:#fff0fa;box-shadow:0 0 0 3px #ffd3ec;}
  .opt.selected::after{
    content:"選択中";
    position:absolute;
    top:-10px;right:-6px;
    background:var(--pink-dark);
    color:#fff;
    font-size:.6rem;
    padding:2px 6px;
    border-radius:8px;
  }
  .opt:active{transform:scale(.95);}
  .opt.none-opt{font-size:1.6rem;color:#cc88aa;}

  /* サイズスライダー（ドレス・ティアラ選択中のみ表示） */
  #size-controls{
    max-width:420px;
    margin:14px auto 0;
    background:var(--panel);
    border-radius:16px;
    padding:10px 16px;
    box-shadow:var(--shadow);
    text-align:left;
  }
  .size-row{
    display:flex;align-items:center;gap:10px;
    margin:6px 0;
    font-size:.85rem;
  }
  .size-row.hidden{display:none;}
  .size-row label{width:80px;flex-shrink:0;color:var(--pink-dark);font-weight:bold;}
  .size-row input[type=range]{flex:1;}
  #size-controls .empty-msg{font-size:.78rem;color:#aaa;text-align:center;margin:4px 0;}
</style>
</head>
<body>

<h1>✨ ふわたんプリンセスサロン ✨</h1>

<div id="stage-wrap">
  <div id="stage">
    <img id="char-layer" class="layer" src="unicorn.png" alt="character" draggable="false">
    <img id="dress-layer" class="layer" alt="dress" draggable="false">
    <img id="tiara-layer" class="layer" alt="tiara" draggable="false">
  </div>
  <div id="hint">ドレスやティアラは指でドラッグして動かせます</div>
</div>

<div id="size-controls">
  <p class="empty-msg" id="empty-msg">ドレスやティアラを選ぶと、ここで大きさを変えられます</p>
  <div class="size-row hidden" id="dress-size-row">
    <label>ドレスの大きさ</label>
    <input type="range" id="dress-scale" min="10" max="120" value="40">
  </div>
  <div class="size-row hidden" id="tiara-size-row">
    <label>ティアラの大きさ</label>
    <input type="range" id="tiara-scale" min="10" max="120" value="22">
  </div>
</div>

<section>
  <h3>キャラクター</h3>
  <div class="row" id="char-row"></div>
</section>

<section>
  <h3>ドレス</h3>
  <div class="row" id="dress-row"></div>
</section>

<section>
  <h3>ティアラ</h3>
  <div class="row" id="tiara-row"></div>
</section>

<script>
const CHARACTERS = [
  {id:'unicorn', name:'ユニコーン', src:'unicorn.png'},
  {id:'cat',     name:'ねこ',       src:'cat.png'},
];
const DRESSES = [1,2,3,4,5,6].map(i => ({id:'dress'+i, src:`dress${i}.png`}));
const TIARAS  = [1,2,3,4,5,6,7,8,9].map(i => ({id:'tiara'+i, src:`tiara${i}.png`}));

// デフォルトの位置・大きさ（キャラクターごと）。% はステージに対する割合、scaleは基準幅に対する倍率
const DEFAULTS = {
  unicorn: {
    dress: {left:50, top:72, scale:36},
    tiara: {left:50, top:40, scale:22},
  },
  cat: {
    dress: {left:50, top:70, scale:38},
    tiara: {left:50, top:42, scale:20},
  }
};

let state = {
  character: 'unicorn',
  dress: null,
  tiara: null,
};

const charLayer = document.getElementById('char-layer');
const dressLayer = document.getElementById('dress-layer');
const tiaraLayer = document.getElementById('tiara-layer');
const stageWrap = document.getElementById('stage-wrap');
const hint = document.getElementById('hint');
const emptyMsg = document.getElementById('empty-msg');
const dressSizeRow = document.getElementById('dress-size-row');
const tiaraSizeRow = document.getElementById('tiara-size-row');
const dressScaleSlider = document.getElementById('dress-scale');
const tiaraScaleSlider = document.getElementById('tiara-scale');

function storageKey(charId, itemId){ return `kiseru_pos_${charId}_${itemId}`; }

function loadPos(charId, type, itemId){
  const saved = localStorage.getItem(storageKey(charId, itemId));
  if(saved) return JSON.parse(saved);
  return {...DEFAULTS[charId][type]};
}
function savePos(charId, itemId, pos){
  localStorage.setItem(storageKey(charId, itemId), JSON.stringify(pos));
}

function applyLayerPos(layer, pos){
  layer.style.left = pos.left + '%';
  layer.style.top = pos.top + '%';
  layer.style.width = pos.scale + '%';
  layer.style.transform = 'translate(-50%,-50%)';
}
function readLayerPos(layer){
  return {
    left: parseFloat(layer.style.left),
    top: parseFloat(layer.style.top),
    scale: parseFloat(layer.style.width),
  };
}

function refreshDress(){
  dressSizeRow.classList.toggle('hidden', !state.dress);
  if(!state.dress){ dressLayer.removeAttribute('src'); dressLayer.style.display='none'; dressLayer.classList.remove('draggable'); updateEmptyMsg(); return; }
  const item = DRESSES.find(d=>d.id===state.dress);
  dressLayer.src = item.src;
  dressLayer.style.display='block';
  dressLayer.classList.add('draggable');
  const pos = loadPos(state.character, 'dress', state.dress);
  applyLayerPos(dressLayer, pos);
  dressScaleSlider.value = pos.scale;
  updateEmptyMsg();
  triggerFlash(dressLayer);
}
function refreshTiara(){
  tiaraSizeRow.classList.toggle('hidden', !state.tiara);
  if(!state.tiara){ tiaraLayer.removeAttribute('src'); tiaraLayer.style.display='none'; tiaraLayer.classList.remove('draggable'); updateEmptyMsg(); return; }
  const item = TIARAS.find(t=>t.id===state.tiara);
  tiaraLayer.src = item.src;
  tiaraLayer.style.display='block';
  tiaraLayer.classList.add('draggable');
  const pos = loadPos(state.character, 'tiara', state.tiara);
  applyLayerPos(tiaraLayer, pos);
  tiaraScaleSlider.value = pos.scale;
  updateEmptyMsg();
  triggerFlash(tiaraLayer);
}
function updateEmptyMsg(){
  emptyMsg.style.display = (!state.dress && !state.tiara) ? 'block' : 'none';
}
function refreshChar(){
  const c = CHARACTERS.find(c=>c.id===state.character);
  charLayer.src = c.src;
}
function refreshAll(){ refreshChar(); refreshDress(); refreshTiara(); }

function buildRow(containerId, items, stateKey, withNone){
  const row = document.getElementById(containerId);
  row.innerHTML='';
  if(withNone){
    const btn = document.createElement('div');
    btn.className='opt none-opt'+(state[stateKey]===null?' selected':'');
    btn.textContent='✕';
    btn.onclick = ()=>{ state[stateKey]=null; refreshAll(); markSelected(containerId, btn); };
    row.appendChild(btn);
  }
  items.forEach(item=>{
    const btn = document.createElement('div');
    btn.className='opt'+(state[stateKey]===item.id?' selected':'');
    const img = document.createElement('img');
    img.src = item.src;
    btn.appendChild(img);
    btn.onclick = ()=>{
      state[stateKey]=item.id;
      refreshAll();
      markSelected(containerId, btn);
      flashHint();
    };
    row.appendChild(btn);
  });
}
function markSelected(containerId, activeBtn){
  document.querySelectorAll('#'+containerId+' .opt').forEach(b=>b.classList.remove('selected'));
  activeBtn.classList.add('selected');
}

function buildCharRow(){
  const row = document.getElementById('char-row');
  row.innerHTML='';
  CHARACTERS.forEach(c=>{
    const btn = document.createElement('div');
    btn.className='opt char-opt'+(state.character===c.id?' selected':'');
    const img = document.createElement('img');
    img.src = c.src;
    btn.appendChild(img);
    const label = document.createElement('span');
    label.textContent = c.name;
    btn.appendChild(label);
    btn.onclick = ()=>{
      state.character = c.id;
      refreshAll();
      document.querySelectorAll('#char-row .opt').forEach(b=>b.classList.remove('selected'));
      btn.classList.add('selected');
    };
    row.appendChild(btn);
  });
}

buildCharRow();
buildRow('dress-row', DRESSES, 'dress', true);
buildRow('tiara-row', TIARAS, 'tiara', true);
refreshAll();

let hintTimer = null;
function flashHint(){
  hint.classList.remove('hidden');
  clearTimeout(hintTimer);
  hintTimer = setTimeout(()=>hint.classList.add('hidden'), 3500);
}
function triggerFlash(layer){
  layer.classList.remove('flash');
  void layer.offsetWidth; // reflow to restart animation
  layer.classList.add('flash');
}

/* サイズスライダー */
dressScaleSlider.oninput = ()=>{
  if(!state.dress) return;
  const pos = readLayerPos(dressLayer);
  pos.scale = Number(dressScaleSlider.value);
  applyLayerPos(dressLayer, pos);
  savePos(state.character, state.dress, pos);
};
tiaraScaleSlider.oninput = ()=>{
  if(!state.tiara) return;
  const pos = readLayerPos(tiaraLayer);
  pos.scale = Number(tiaraScaleSlider.value);
  applyLayerPos(tiaraLayer, pos);
  savePos(state.character, state.tiara, pos);
};

/* ドラッグ移動（マウス・タッチ両対応）：ドレス・ティアラそれぞれに直接イベントをつける */
function setupDrag(layer, getItemId){
  let dragging = false, dragStart = {x:0,y:0}, startPos = null;

  function down(e){
    if(!layer.classList.contains('draggable')) return;
    dragging = true;
    dragStart = getPoint(e);
    startPos = readLayerPos(layer);
    e.preventDefault();
    e.stopPropagation();
  }
  function move(e){
    if(!dragging) return;
    const rect = stageWrap.getBoundingClientRect();
    const p = getPoint(e);
    const dxPct = (p.x - dragStart.x) / rect.width * 100;
    const dyPct = (p.y - dragStart.y) / rect.height * 100;
    const pos = {left: startPos.left + dxPct, top: startPos.top + dyPct, scale: startPos.scale};
    applyLayerPos(layer, pos);
    e.preventDefault();
  }
  function up(){
    if(!dragging) return;
    dragging = false;
    const itemId = getItemId();
    if(itemId) savePos(state.character, itemId, readLayerPos(layer));
  }
  layer.addEventListener('mousedown', down);
  layer.addEventListener('touchstart', down, {passive:false});
  layer.addEventListener('dragstart', e=>e.preventDefault());
  window.addEventListener('mousemove', move);
  window.addEventListener('touchmove', move, {passive:false});
  window.addEventListener('mouseup', up);
  window.addEventListener('touchend', up);
}
function getPoint(e){
  if(e.touches && e.touches[0]) return {x:e.touches[0].clientX, y:e.touches[0].clientY};
  return {x:e.clientX, y:e.clientY};
}
setupDrag(tiaraLayer, ()=>state.tiara); // 上に重なっているティアラを先に登録（タップ優先）
setupDrag(dressLayer, ()=>state.dress);
</script>
</body>
</html>
